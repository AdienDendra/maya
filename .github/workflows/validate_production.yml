name: Validate production source

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: v12.3-production-cleanup

      - name: Validate production source
        run: |
          python3 ad-skin-tools/tools/validate_source.py
          python3 -m compileall -q ad-skin-tools/ad_skin_tools
          git diff --check
