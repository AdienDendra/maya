name: Production cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: v12.3-production-cleanup
          fetch-depth: 0
          persist-credentials: true

      - name: Apply production cleanup
        run: python3 .github/production_cleanup.py

      - name: Capture validation diagnostics
        run: |
          set +e
          {
            echo '=== validate_source.py ==='
            python3 ad-skin-tools/tools/validate_source.py
            echo "validate_source exit: $?"
            echo '=== compileall ==='
            python3 -m compileall -q ad-skin-tools/ad_skin_tools
            echo "compileall exit: $?"
            echo '=== git diff --check ==='
            git diff --check
            echo "diff_check exit: $?"
          } > production_validation.log 2>&1
          cat production_validation.log
          exit 0

      - name: Commit promoted source and diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Promote shared smoothing and capture validation [production-cleanup]"
          git push origin HEAD:v12.3-production-cleanup
