name: Production cleanup

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out cleanup branch
        uses: actions/checkout@v4
        with:
          ref: v12.3-production-cleanup
          fetch-depth: 0
          persist-credentials: true

      - name: Apply production cleanup
        run: python3 .github/production_cleanup.py

      - name: Validate source
        run: |
          python3 ad-skin-tools/tools/validate_source.py
          python3 -m compileall -q ad-skin-tools/ad_skin_tools
          git diff --check

      - name: Commit promoted production source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Promote shared smoothing and clean production source [production-cleanup]"
          git push origin HEAD:v12.3-production-cleanup
